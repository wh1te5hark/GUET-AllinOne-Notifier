<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GUET All-in-One Notifier</title>
    <meta
      name="description"
      content="桂电消息统一采集与推送平台，聚合教务、畅课、电费、水费与校园卡等通知。"
    />
    <link rel="stylesheet" href="./assets/vendor/fonts/material-fonts.css" />
    <link rel="stylesheet" href="./assets/vendor/mdui/mdui.css" />
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <mdui-layout>
      <mdui-top-app-bar class="topbar">
        <mdui-button-icon id="menu-toggle" icon="menu"></mdui-button-icon>
        <mdui-top-app-bar-title>GUET Notifier</mdui-top-app-bar-title>
        <div class="topbar-actions">
          <mdui-button variant="text" href="#/home">主页</mdui-button>
          <mdui-button variant="text" href="#/overview">概览</mdui-button>
        </div>
        <div id="top-account" class="top-account" style="display:none">未登录</div>
        <div id="top-user-menu" class="top-user-menu">
          <button id="top-avatar-trigger" class="avatar-trigger" type="button" aria-label="账户菜单">
            <img id="top-avatar-img" class="avatar-img" alt="账户头像" style="display:none" />
            <span id="top-avatar-fallback" class="avatar-fallback">G</span>
          </button>
          <div id="top-avatar-panel" class="avatar-panel" hidden>
            <div id="top-avatar-name" class="avatar-name">未登录</div>
            <div class="avatar-menu-actions">
              <button id="menu-profile-btn" class="avatar-menu-item" type="button">个人资料</button>
              <button id="menu-logout-btn" class="avatar-menu-item danger" type="button">登出 / 切换账号</button>
            </div>
          </div>
        </div>
        <mdui-tooltip content="切换日夜间主题">
          <mdui-button-icon id="theme-toggle" icon="dark_mode"></mdui-button-icon>
        </mdui-tooltip>
      </mdui-top-app-bar>

      <mdui-navigation-drawer id="nav-drawer" close-on-overlay-click>
        <div class="drawer-header">
          <div class="drawer-avatar">
            <img id="drawer-avatar-img" class="drawer-avatar-img" alt="侧栏头像" style="display:none" />
            <span id="drawer-avatar-fallback" class="drawer-avatar-fallback">G</span>
          </div>
          <div>
            <div class="drawer-title" id="drawer-display-name">未登录</div>
            <div class="drawer-subtitle" id="drawer-account">当前账号：--</div>
          </div>
        </div>
        <div class="drawer-user-actions">
          <mdui-button id="drawer-logout-btn" variant="outlined" full-width>退出登录</mdui-button>
        </div>
        <mdui-list>
          <mdui-list-item href="#/home" icon="home">主页</mdui-list-item>
          <mdui-list-item href="#/login" icon="verified_user">登录</mdui-list-item>
          <mdui-list-item href="#/overview" icon="dashboard">概览</mdui-list-item>
          <mdui-list-item href="#/collectors" icon="travel_explore">采集器</mdui-list-item>
          <mdui-list-item href="#/rules" icon="tune">转发规则</mdui-list-item>
          <mdui-list-item href="#/pushers" icon="notifications_active">推送器</mdui-list-item>
        </mdui-list>
        <mdui-divider></mdui-divider>
        <div class="drawer-theme-panel">
          <div class="drawer-theme-title">主题模式</div>
          <div class="drawer-theme-actions">
            <mdui-button id="theme-mode-auto" variant="outlined" full-width>跟随系统</mdui-button>
            <mdui-button id="theme-mode-light" variant="outlined" full-width>日间模式</mdui-button>
            <mdui-button id="theme-mode-dark" variant="outlined" full-width>夜间模式</mdui-button>
          </div>
        </div>
        
        <!-- 偏好设置 -->
        <div class="drawer-preferences-section">
          <mdui-button id="preferences-toggle" variant="outlined" full-width icon="settings">偏好设置</mdui-button>
          
          <div id="preferences-panel" class="drawer-preferences-panel" style="display: none;">
            <!-- 语言设置 -->
            <div class="drawer-language-panel">
              <div class="drawer-color-title">语言偏好</div>
              <div class="language-controls">
                <mdui-button id="language-zh" variant="filled" size="small">简体中文</mdui-button>
                <mdui-button id="language-en" variant="outlined" size="small">English</mdui-button>
              </div>
              <div class="language-preview">
                <p class="language-preview-text">这是语言预览文本 / This is language preview text</p>
              </div>
            </div>
            
            <!-- 字体大小设置 -->
            <div class="drawer-font-panel">
              <div class="drawer-color-title">字体大小</div>
              <div class="font-size-controls">
                <mdui-button id="font-size-sm" variant="outlined" size="small">小</mdui-button>
                <mdui-button id="font-size-base" variant="filled" size="small">中</mdui-button>
                <mdui-button id="font-size-lg" variant="outlined" size="small">大</mdui-button>
              </div>
              <div class="font-size-preview">
                <p class="font-size-preview-text">这是字体大小预览文本</p>
              </div>
            </div>
            
            <!-- 自定义颜色有故障喵 -->
            <div class="drawer-color-panel" style="display: none;">
              <div class="drawer-color-title">自定义颜色</div>
              <div class="color-picker-group">
                <div class="color-picker-item">
                  <span class="color-picker-label" data-tooltip="主色调：应用于按钮、链接和主要交互元素">主色调</span>
                  <div class="color-picker" style="background-color: #1e40af;">
                    <input type="color" id="color-primary" value="#1e40af">
                  </div>
                </div>
                <div class="color-picker-item">
                  <span class="color-picker-label" data-tooltip="强调色：应用于次要交互元素和高亮显示">强调色</span>
                  <div class="color-picker" style="background-color: #0284c7;">
                    <input type="color" id="color-accent" value="#0284c7">
                  </div>
                </div>
                <div class="color-picker-item">
                  <span class="color-picker-label" data-tooltip="危险色：应用于错误提示和删除操作">危险色</span>
                  <div class="color-picker" style="background-color: #dc2626;">
                    <input type="color" id="color-danger" value="#dc2626">
                  </div>
                </div>
              </div>
              <div class="drawer-color-title">预设颜色</div>
              <div class="preset-colors" id="preset-colors">
                <div class="preset-color" data-color="#1e40af" style="background-color: #1e40af;"></div>
                <div class="preset-color" data-color="#0369a1" style="background-color: #0369a1;"></div>
                <div class="preset-color" data-color="#059669" style="background-color: #059669;"></div>
                <div class="preset-color" data-color="#d97706" style="background-color: #d97706;"></div>
                <div class="preset-color" data-color="#b91c1c" style="background-color: #b91c1c;"></div>
                <div class="preset-color" data-color="#0f766e" style="background-color: #0f766e;"></div>
                <div class="preset-color" data-color="#1e3a8a" style="background-color: #1e3a8a;"></div>
                <div class="preset-color" data-color="#0c4a6e" style="background-color: #0c4a6e;"></div>
                <div class="preset-color" data-color="#065f46" style="background-color: #065f46;"></div>
                <div class="preset-color" data-color="#92400e" style="background-color: #92400e;"></div>
                <div class="preset-color" data-color="#7f1d1d" style="background-color: #7f1d1d;"></div>
                <div class="preset-color" data-color="#155e75" style="background-color: #155e75;"></div>
              </div>
              <div class="color-actions">
                <mdui-button id="reset-colors-btn" variant="outlined" full-width>重置颜色</mdui-button>
                <mdui-button id="save-colors-btn" variant="filled" full-width>保存颜色</mdui-button>
              </div>
            </div>
          </div>
        </div>
      </mdui-navigation-drawer>

      <mdui-layout-main>
        <main class="page">
          <div id="route-view"></div>
        </main>
      </mdui-layout-main>
    </mdui-layout>

    <mdui-dialog id="two-factor-dialog" headline="CAS 二次验证">
      <div class="two-factor-dialog-content">
        <p class="two-factor-hint">CAS 需要二次验证，请选择验证方式并完成认证。</p>
        <div id="two-factor-status" class="two-factor-status"></div>
        <mdui-select id="two-factor-method-field" label="验证方式" value="sms_code" variant="outlined">
          <mdui-menu-item value="sms_code">短信验证码</mdui-menu-item>
          <mdui-menu-item value="wechat_qr">微信扫码</mdui-menu-item>
        </mdui-select>
        <div id="sms-panel" class="two-factor-panel">
          <mdui-text-field
            id="two-factor-code-field"
            label="验证码"
            variant="outlined"
            maxlength="16"
            helper="收到短信后在此输入验证码"
          ></mdui-text-field>
          <div class="two-factor-dialog-actions">
            <mdui-button type="button" variant="tonal" id="send-2fa-code-btn">发送短信验证码</mdui-button>
            <mdui-button type="button" variant="filled" id="verify-2fa-btn">提交验证码</mdui-button>
          </div>
        </div>
        <div id="wechat-panel" class="two-factor-panel" style="display:none">
          <div id="wechat-qr-area" class="wechat-qr-area">
            <p class="wechat-qr-hint">点击下方按钮获取微信二维码</p>
            <img id="wechat-qr-img" class="wechat-qr-img" alt="微信二维码" style="display:none" />
            <div id="wechat-qr-overlay" class="wechat-qr-overlay" style="display:none"></div>
          </div>
          <mdui-button type="button" variant="tonal" id="open-wechat-2fa-btn" full-width>获取微信二维码</mdui-button>
        </div>
      </div>
      <mdui-button slot="action" variant="text" id="close-2fa-dialog-btn">取消</mdui-button>
    </mdui-dialog>

    <script type="module" src="./assets/vendor/mdui/mdui.global.js"></script>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
